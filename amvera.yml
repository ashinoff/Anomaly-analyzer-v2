# Конфигурация деплоя на Amvera Cloud (https://docs.amvera.ru)
# Веб-приложение на FastAPI (uvicorn). Загрузка файла — чанками, поэтому
# лимит тела запроса прокси Amvera (HTTP 413) не мешает.
meta:
  environment: python
  toolchain:
    name: pip
    version: "3.12"
build:
  requirementsPath: requirements.txt
run:
  command: uvicorn main:app --host 0.0.0.0 --port 80
  containerPort: 80
  persistenceMount: /data
