# Настройки Streamlit. Файл читается автоматически из папки .streamlit/

[theme]
# Тёмная «космос»-тема: виджеты (слайдеры, вкладки, dataframe, загрузчик)
# берут цвета отсюда, наши блоки — из assets/app.css. Фон приложения над
# backgroundColor дорисовывается CSS'ом (звёздный градиент + сетка).
base = "dark"
primaryColor = "#5AA2FF"
backgroundColor = "#05070F"
secondaryBackgroundColor = "#101D3C"
textColor = "#E8EEF8"
font = "sans serif"

[server]
# Максимальный размер загружаемого Excel-файла, МБ
maxUploadSize = 200
